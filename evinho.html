
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0b4ea2" />
<title>Cadastro de Clientes FBF</title>
<link rel="stylesheet" href="style.css" />
</head>
<body data-vendedor="Evinho Martins" data-fone="5515997099990">
<div class="container">
<header>
<h1>Cadastro de Clientes FBF</h1>
<p>Preencha os dados abaixo.</p>
</header>

<form id="cadastroForm">

<div class="field">
<label>CPF ou CNPJ *</label>
<input type="text" id="cpfCnpj" required />
</div>

<div class="field">
<label>Razão Social *</label>
<input type="text" id="razaoSocial" required />
</div>

<div class="field">
<label>Nome Fantasia *</label>
<input type="text" id="nomeFantasia" required />
</div>

<div class="field">
<label>Inscrição Estadual</label>
<div class="inline">
<input type="text" id="ie" />
<label class="checkbox"><input type="checkbox" id="isento" /> ISENTO</label>
</div>
</div>

<div class="field">
<label>CEP *</label>
<input type="text" id="cep" required />
<small id="cepStatus"></small>
</div>

<div class="field">
<label>Rua</label>
<input type="text" id="rua" readonly />
</div>

<div class="grid">
<div class="field">
<label>Número *</label>
<input type="text" id="numero" required />
</div>

<div class="field">
<label>Complemento</label>
<input type="text" id="complemento" />
</div>
</div>

<div class="field">
<label>Bairro</label>
<input type="text" id="bairro" readonly />
</div>

<div class="grid">
<div class="field">
<label>Cidade</label>
<input type="text" id="cidade" readonly />
</div>

<div class="field">
<label>Estado</label>
<input type="text" id="estado" readonly />
</div>
</div>

<div class="field">
<label>Telefone *</label>
<input type="tel" id="telefone1" required />
</div>

<div class="field">
<label>Telefone 2</label>
<input type="tel" id="telefone2" />
</div>

<div class="field">
<label>Nome Contato *</label>
<input type="text" id="nomeContato" required />
</div>

<div class="field">
<label>E-mail *</label>
<input type="email" id="email" required />
</div>

<div class="field">
<label>Tipo de Atividade *</label>
<select id="atividade" required>
<option value="">Selecione</option>
<option>Restaurante</option>
<option>Padaria</option>
<option>Açougue</option>
<option>Lanchonete</option>
<option>Mercado</option>
<option>Conveniência</option>
<option>Distribuidora</option>
<option>Doceria</option>
<option>Sorveteria</option>
<option>Pizzaria</option>
<option>Outro</option>
</select>
</div>

<div class="field hidden" id="outroField">
<label>Qual atividade?</label>
<input type="text" id="atividadeOutro" />
</div>

<div class="field">
<label>Data Início Empresa</label>
<input type="date" id="dataInicio" />
</div>


<div class="field">
<label>Horário e dias de recebimento</label>
<input type="text" id="horarioRecebimento" />
</div>

<button type="submit" id="submitBtn">Enviar Cadastro</button>

<div id="successMessage"></div>

</form>

<footer>
<a href="https://fbfdistribuidora.com.br/" target="_blank">Site Oficial FBF</a>
<a href="https://g.page/r/CUGeLcQViUp1EBM/review" target="_blank">Avaliar no Google</a>
</footer>

</div>

<script src="script.js"></script>
</body>
</html>
